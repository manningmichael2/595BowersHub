name: CI

# Runs on every push to main and on all pull requests. Three independent jobs:
#   - frontend:  vitest unit tests, strict typecheck, production build
#   - backend:   the pure (no-database) test suite
#   - secrets:   gitleaks scan of committed history
#
# NOTE (project-review.md C2): the backend's DB-backed integration tests are
# intentionally NOT run here yet. Their fixtures build the schema via
# run_migrations(), which currently cannot build a fresh database (duplicate /
# crashing migrations). Once C2 lands (reproducible-from-zero schema), add a
# Postgres service to the backend job, run the full `pytest` suite, and add a
# from-empty-schema migration test. See the TODO in the backend job below.

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same branch cancels the in-flight run for it.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (test · typecheck · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bowershub-ai/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: bowershub-ai/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm run test
      - name: Production build
        run: npm run build

  backend:
    name: Backend (pure tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bowershub-ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'  # matches the backend Dockerfile
          cache: pip
          cache-dependency-path: |
            bowershub-ai/requirements.txt
            bowershub-ai/requirements-test.txt
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-test.txt
      - name: Pure tests (no database)
        run: PYTHONPATH=. python -m pytest backend/tests/properties -q
      # TODO(C2 — reproducible schema): once run_migrations() can build a fresh
      # database, add a Postgres `services:` block here and replace the line
      # above with the full suite, e.g.:
      #   env: { DB_HOST: localhost, DB_PORT: 5432, DB_USER: michael, DB_PASSWORD: postgres }
      #   run: PYTHONPATH=. python -m pytest -q
      # and add a dedicated "schema builds from empty" migration test.

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so every committed object is scanned
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
      - name: Scan committed history
        run: gitleaks detect --redact --no-banner
