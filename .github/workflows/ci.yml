name: CI

# Runs on every push to main and on all pull requests. Three independent jobs:
#   - frontend:  vitest unit tests, strict typecheck, production build
#   - backend:   the full pytest suite against a Postgres service
#   - secrets:   gitleaks scan of committed history
#
# NOTE (project-review.md C2): C2 has landed — the migration chain was squashed
# to a single reproducible 0001_baseline.sql (+ 0002.. forward-only), so the
# `fresh_db` fixtures build the schema from empty via run_migrations(). The
# backend job therefore runs the FULL DB-backed suite, which doubles as the
# "schema builds from empty" gate. (The orphaned top-level /migrations dir is
# now dead and slated for removal — see project-review.md C2.)

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same branch cancels the in-flight run for it.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (test · typecheck · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bowershub-ai/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: bowershub-ai/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm run test
      - name: Production build
        run: npm run build

  backend:
    name: Backend (full suite + from-empty schema)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bowershub-ai
    # The DB-backed tests create ephemeral databases on this service and build
    # the schema from the squashed baseline via run_migrations() — so the full
    # suite is also the "schema builds from empty" gate (project-review.md C2).
    #
    # It also includes test_migrate_as_app_role.py, which reproduces the PROD
    # deploy topology (scoped non-superuser runtime role + elevated migrator) and
    # would have caught the 2026-06-19 ownership crash-loop. The rest of the suite
    # runs migrations as the superuser DB_USER below, so without that test the
    # scoped deploy path would NOT be exercised by CI (project-review.md C1/C7).
    services:
      postgres:
        # Must be pgvector-capable: conftest.py pre-creates the `vector` extension
        # (semantic memory, migration 0010). Plain postgres:16-alpine lacks it and
        # turns the whole backend job red — which is how CI sat broken since
        # 2026-06-12 while real failures (incl. a non-compiling frontend) shipped.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: michael
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U michael"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: michael
      DB_PASSWORD: postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'  # matches the backend Dockerfile
          cache: pip
          cache-dependency-path: |
            bowershub-ai/requirements.txt
            bowershub-ai/requirements-test.txt
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-test.txt
      - name: Full test suite (Postgres-backed)
        # Includes the categorization eval regression gate
        # (backend/tests/test_eval_regression_gate.py, R2.7): it scores the full
        # cascade over finance.eval_labels and fails the build if transfer
        # detection or end-to-end accuracy regresses below the baselines — so any
        # change to a tier, the `categorizer` role, or the thresholds is gated here.
        run: PYTHONPATH=. python -m pytest -q

  restore-test:
    name: Restore drill (backup is restorable)
    runs-on: ubuntu-latest
    # Complements the "schema builds from empty" gate: the backend job proves the
    # migration chain rebuilds the schema, but NOT that a real pg_dump + globals
    # round-trips back (the 2026-06-09 manual drill, now automated). --selftest is
    # self-contained — it spins its own source + target containers (Docker is
    # available on the runner), builds the schema via run_migrations, then
    # dump -> globals -> createdb -> pg_restore and asserts every table's row count
    # survives. No service container or prod access needed.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'  # matches the backend Dockerfile
          cache: pip
          cache-dependency-path: bowershub-ai/requirements.txt
      - name: Install backend deps (run_migrations needs asyncpg)
        working-directory: bowershub-ai
        run: pip install -r requirements.txt
      - name: DR restore drill (self-contained)
        run: bash scripts/restore-test.sh --selftest

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so every committed object is scanned
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
      - name: Scan committed history
        run: gitleaks detect --redact --no-banner
