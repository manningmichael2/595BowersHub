# BowersHub AI — custom chat app
# Deploy: docker compose up -d --build
# Rebuild: docker compose build --no-cache && docker compose up -d

services:
  bowershub-ai:
    build: .
    container_name: bowershub-ai
    restart: unless-stopped
    ports:
      - "5003:5003"
    volumes:
      - /home/michael/files:/files
      - /home/michael/knowledge:/knowledge
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/run/tailscale:/var/run/tailscale:ro
    env_file: .env
    networks:
      - ai-network
    healthcheck:
      # curl isn't in the python:3.12-slim image; use the bundled interpreter.
      # /api/health always returns 200 (liveness) — urlopen raises on non-2xx.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5003/api/health').read()"]
      start_period: 20s
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  ai-network:
    external: true
    name: ai-services_ai-network
